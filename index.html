// ── Parse Excel ───────────────────────────────────────────────────────────────
function calPerfParse(buf){
  var wb=XLSX.read(buf,{type:'array',cellDates:false});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var rows=XLSX.utils.sheet_to_json(ws,{defval:null,raw:true});

  // Agrupar por usuario + fecha (día)
  var grouped={};
  rows.forEach(function(row){
    var fechaRaw=row['Fecha']||row['fecha']||'';
    var usuario=(row['Usuario']||row['usuario']||'').trim().toLowerCase();
    var cantidad=parseFloat(String(row['Cantidad']||row['cantidad']||'0').replace(',','.'))||0;
    var articulo=String(row['Artículo']||row['Articulo']||row['articulo']||'').trim();

    if(!usuario||!fechaRaw||!cantidad)return;

    // Extraer fecha como YYYY-MM-DD
    var fechaStr='';
    if(typeof fechaRaw==='number'){
      // Excel serial date
      var d=new Date(Math.round((fechaRaw-25569)*86400*1000));
      fechaStr=d.toISOString().slice(0,10);
    } else {
      var s=String(fechaRaw).trim();
      // Format: "27/05/26 7:56" o "27/05/2026 07:56"
      var m=s.match(/^(\d{1,2})\/(\d{2})\/(\d{2,4})/);
      if(m){
        var yr=+m[3];if(yr<100)yr+=2000;
        fechaStr=yr+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
      }
    }
    if(!fechaStr)return;

    var key=usuario+'|'+fechaStr;
    if(!grouped[key]){
      grouped[key]={
        mes_key:fechaStr.slice(0,7),
        fecha:fechaStr,
        usuario:usuario,
        unidades:0,
        articulos:{},
        updated_at:new Date().toISOString()
      };
    }
    grouped[key].unidades+=cantidad;
    if(articulo){
      grouped[key].articulos[articulo]=(grouped[key].articulos[articulo]||0)+cantidad;
    }
  });

  // Convertir articulos de objeto a array
  return Object.values(grouped).map(function(r){
    r.articulos=Object.entries(r.articulos).map(function(e){
      return {cod:e[0],cant:e[1]};
    }).sort(function(a,b){return b.cant-a.cant;});
    return r;
  });
}

// ── Load UI ───────────────────────────────────────────────────────────────────
function showCalPerfLoad(){
  document.getElementById('main').innerHTML=
    '<div style="max-width:600px;padding:4px">'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:6px">Cargar reporte de performance</div>'+
    '<div style="background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--muted2);line-height:1.8">'+
    '1. Bajá el reporte del WMS para cada usuario (fecha + usuario)<br>'+
    '2. Podés cargar los archivos de a uno o todos juntos<br>'+
    '3. Si cargás el mismo usuario/fecha, pisa el registro anterior</div>'+

    '<div class="drop-box" id="calPerfDrop" style="max-width:100%;margin-bottom:12px" '+
    'ondragover="event.preventDefault();this.classList.add(\'drag\')" '+
    'ondragleave="this.classList.remove(\'drag\')" '+
    'ondrop="calPerfDrop(event)">'+
    '<div class="drop-icon">📊</div>'+
    '<div class="drop-t">Arrastrá uno o más archivos Excel</div>'+
    '<div class="drop-s">asacconi · camdef01 · camdef03</div><br>'+
    '<button class="btn btn-p" onclick="document.getElementById(\'calPerfFile\').click()">Seleccionar archivos</button>'+
    '<input type="file" id="calPerfFile" accept=".xlsx,.xls" multiple onchange="calPerfReadFiles(this.files)">'+
    '</div>'+
    '<button class="btn btn-o btn-sm" onclick="renderCalPerf()">Cancelar</button>'+
    '</div>';
}

function calPerfDrop(e){
  e.preventDefault();
  var b=document.getElementById('calPerfDrop');if(b)b.classList.remove('drag');
  if(e.dataTransfer.files.length)calPerfReadFiles(e.dataTransfer.files);
}

function calPerfReadFiles(files){
  if(!files||!files.length)return;
  ldr(1,'Leyendo archivos...');
  var allRecords=[];
  var pending=files.length;

  Array.from(files).forEach(function(f){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var records=calPerfParse(e.target.result);
        allRecords=allRecords.concat(records);
      }catch(ex){toast('Error en '+f.name+': '+ex.message,'err');}
      pending--;
      if(pending===0){
        if(!allRecords.length){toast('Sin datos válidos','err');ldr(0);return;}
        // Preview
        ldr(0);
        calPerfPreview(allRecords);
      }
    };
    reader.readAsArrayBuffer(f);
  });
}

function calPerfPreview(records){
  // Agrupar por usuario para mostrar resumen
  var byUser={};
  records.forEach(function(r){
    var name=calUserName(r.usuario);
    if(!byUser[name])byUser[name]={uds:0,dias:new Set()};
    byUser[name].uds+=r.unidades;
    byUser[name].dias.add(r.fecha);
  });

  var previewHtml='<div style="background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:14px;margin-top:14px">'+
    '<div style="font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">'+
    records.length+' registros leídos</div>'+
    '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">';

  Object.entries(byUser).forEach(function(e){
    previewHtml+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:140px">'+
      '<div style="font-size:11px;font-weight:700;margin-bottom:4px">'+e[0]+'</div>'+
      '<div style="font-size:20px;font-weight:800;color:var(--cam)">'+Math.round(e[1].uds)+'</div>'+
      '<div style="font-size:10px;color:var(--muted2)">uds · '+e[1].dias.size+' día'+(e[1].dias.size>1?'s':'')+'</div>'+
      '</div>';
  });

  previewHtml+='</div>'+
    '<div style="display:flex;gap:8px">'+
    '<button class="btn btn-g" onclick="calPerfConfirmSave(window._calPerfRecords)">✓ Confirmar y guardar</button>'+
    '<button class="btn btn-r btn-sm" onclick="showCalPerfLoad()">✕ Revisar</button>'+
    '</div></div>';

  window._calPerfRecords=records;
  var main=document.getElementById('main').querySelector('div');
  if(main)main.insertAdjacentHTML('beforeend',previewHtml);
}

async function calPerfConfirmSave(records){
  ldr(1,'Guardando '+records.length+' registros...');
  var ok=await calPerfUpsert(records);
  if(ok){
    window._calPerfRecords=null;
    toast('✓ '+records.length+' registros guardados');
    renderCalPerf();
  }
  ldr(0);
}

// ── Render ────────────────────────────────────────────────────────────────────
async function renderCalPerf(){
  ldr(1,'Cargando...');
  var data=await calPerfLoad(CUR);
  ldr(0);

  if(!data.length){
    document.getElementById('main').innerHTML=
      '<div class="upload-area"><div style="text-align:center">'+
      '<div style="font-size:44px;margin-bottom:14px">👤</div>'+
      '<div style="font-size:15px;font-weight:700;margin-bottom:8px">Sin datos de performance en '+fmtMonth(CUR)+'</div>'+
      '<div style="color:var(--muted2);font-size:12px;margin-bottom:18px">Cargá los reportes del WMS</div>'+
      '<button class="btn btn-p" onclick="checkPass(function(){showCalPerfLoad();})">+ Cargar reportes</button>'+
      '</div></div>';
    return;
  }

  // Aggregations
  var byUser={};
  var byDate={};
  var byArticulo={};
  var totMes=0;

  data.forEach(function(r){
    var name=calUserName(r.usuario);
    var uds=r.unidades||0;
    totMes+=uds;

    // Por usuario
    if(!byUser[name])byUser[name]={nombre:name,uds:0,dias:0,porFecha:{}};
    byUser[name].uds+=uds;
    byUser[name].porFecha[r.fecha]=(byUser[name].porFecha[r.fecha]||0)+uds;

    // Por fecha
    if(!byDate[r.fecha])byDate[r.fecha]={};
    byDate[r.fecha][name]=(byDate[r.fecha][name]||0)+uds;

    // Por artículo
    (r.articulos||[]).forEach(function(a){
      if(!byArticulo[a.cod])byArticulo[a.cod]={cod:a.cod,cant:0};
      byArticulo[a.cod].cant+=a.cant;
    });
  });

  // Calcular días por usuario
  Object.values(byUser).forEach(function(u){
    u.dias=Object.keys(u.porFecha).length;
    u.promDia=u.dias>0?Math.round(u.uds/u.dias):0;
  });

  var users=Object.values(byUser).sort(function(a,b){return b.uds-a.uds;});
  var dates=Object.keys(byDate).sort();
  var topArts=Object.values(byArticulo).sort(function(a,b){return b.cant-a.cant;}).slice(0,15);

  var html='';

  // KPIs
  html+=mkStats([
    {l:'Total unidades mes', v:Math.round(totMes).toLocaleString('es-AR'), cls:'ccam'},
    {l:'Días con actividad',  v:dates.length},
    {l:'Usuarios activos',    v:users.length},
  ]);

  // Tabla consolidada por usuario
  html+='<div class="cg2" style="margin-bottom:14px">';
  html+=mkTable('Consolidado del mes — '+fmtMonth(CUR),
    '<tr><th>#</th><th>Usuario</th><th>Unidades mes</th><th>Días trabajados</th><th>Prom. / día</th></tr>',
    users.map(function(u,i){
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'';
      return '<tr>'+
        '<td>'+medal+'</td>'+
        '<td class="tl"><strong>'+u.nombre+'</strong></td>'+
        '<td><strong style="color:var(--cam)">'+Math.round(u.uds).toLocaleString('es-AR')+'</strong></td>'+
        '<td>'+u.dias+'</td>'+
        '<td>'+u.promDia.toLocaleString('es-AR')+'</td>'+
        '</tr>';
    }).join('')
  );

  // Top artículos
  html+=mkTable('Top artículos trabajados',
    '<tr><th>#</th><th>Artículo</th><th>Unidades</th></tr>',
    topArts.map(function(a,i){
      return '<tr><td>'+(i+1)+'</td><td class="tl" style="font-size:10px">'+a.cod+'</td>'+
        '<td><strong>'+Math.round(a.cant)+'</strong></td></tr>';
    }).join('')
  );
  html+='</div>';

  // Tabla por fecha
  var dateRows=dates.map(function(d){
    var fp=d.slice(8)+'/'+d.slice(5,7);
    var total=Object.values(byDate[d]).reduce(function(a,v){return a+v;},0);
    var cols=users.map(function(u){
      var v=byDate[d][u.nombre]||0;
      return '<td>'+(v>0?v:'—')+'</td>';
    }).join('');
    return '<tr><td class="tl"><strong>'+fp+'</strong></td>'+cols+
      '<td><strong>'+Math.round(total)+'</strong></td></tr>';
  }).join('');

  var userHeaders=users.map(function(u){return '<th>'+u.nombre.split(' ')[0]+'</th>';}).join('');
  html+=mkTable('Detalle diario',
    '<tr><th>Fecha</th>'+userHeaders+'<th>Total día</th></tr>',
    dateRows
  );

  // Botón cargar más
  html+='<div style="margin-top:4px">'+
    '<button class="btn btn-p btn-sm" onclick="checkPass(function(){showCalPerfLoad();})">+ Cargar reportes</button>'+
    '</div>';

  document.getElementById('main').innerHTML=html;
}


function ingVolverResumen(){PAGE='resumen';updNav();renderIngResumen();}
function renderIngresosDias(){
  var all=window.ING_DATA||[];
  var F=window.ING_F;

  // Filtrar igual que buildIngView pero sin filtro de fecha
  var filtered=all.filter(function(r){
    if(F.origen!=='TODOS'&&r.origen!==F.origen)return false;
    if(F.bu!=='TODOS'&&r.bu!==F.bu)return false;
    if(F.estado!=='TODOS'&&r.estado!==F.estado)return false;
    return true;
  });

  // Agrupar por fecha
  var byFecha={};
  filtered.forEach(function(r){
    var f=r.fecha_llegada||'Sin fecha';
    if(!byFecha[f])byFecha[f]={fecha:f,uds:0,bultos:0,pend:0,dels:new Set(),nac:0,imp:0};
    byFecha[f].uds+=r.unidades||0;
    byFecha[f].bultos+=r.bultos||0;
    byFecha[f].dels.add(r.nro_delivery);
    if(r.estado==='P')byFecha[f].pend+=r.unidades||0;
    if(r.origen==='NACIONAL')byFecha[f].nac+=r.unidades||0;
    else byFecha[f].imp+=r.unidades||0;
  });

  var dias=Object.values(byFecha).sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var mNombres=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Filtros rápidos
  var html='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">';
  function sel(label,key,opts,labelMap){
    var s='<div style="display:flex;align-items:center;gap:5px">'+
      '<span style="font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase">'+label+'</span>'+
      '<select onchange="window.ING_F.'+key+'=this.value;renderIngresosDias()" '+
      'style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:4px 8px;font-size:11px;font-family:inherit">';
    opts.forEach(function(o){
      var lbl=labelMap?labelMap[o]||o:o;
      s+='<option value="'+o+'"'+(F[key]==o?' selected':'')+'>'+lbl+'</option>';
    });
    return s+'</select></div>';
  }
  html+=sel('ORIGEN','origen',['TODOS','NACIONAL','IMPORTADO'],{TODOS:'Todos'});
  html+=sel('GPC / BU','bu',['TODOS','FTW','APP','EQP'],{TODOS:'Todos'});
  html+=sel('ESTADO','estado',['TODOS','R','P'],{TODOS:'Todos',R:'Recibidos',P:'Pendientes'});
  html+='<button class="btn btn-o btn-sm" onclick="ingVolverResumen()">&#8592; Volver al resumen</button>';
  html+='</div>';

  if(!dias.length){
    html+='<div class="no-data">Sin datos con los filtros seleccionados</div>';
    document.getElementById('main').innerHTML=html;
    return;
  }

  // KPI rápido
  var totUds=dias.reduce(function(a,d){return a+d.uds;},0);
  var totPend=dias.reduce(function(a,d){return a+d.pend;},0);
  html+=mkStats([
    {l:'Días con actividad',v:dias.length},
    {l:'Total unidades',v:totUds.toLocaleString('es-AR'),cls:'cing'},
    {l:'Pendientes',v:totPend.toLocaleString('es-AR'),cls:totPend>0?'cbad':'cok'},
  ]);

  // Tabla por día
  var rows=dias.map(function(d){
    var fp=d.fecha!=='Sin fecha'?d.fecha.slice(8)+'/'+d.fecha.slice(5,7)+'/'+d.fecha.slice(0,4):d.fecha;
    return '<tr>'+
      '<td class="tl"><strong>'+fp+'</strong></td>'+
      '<td>'+d.dels.size+'</td>'+
      '<td>'+(d.nac>0?'<span class="badge btm">'+d.nac.toLocaleString('es-AR')+'</span>':'—')+'</td>'+
      '<td>'+(d.imp>0?'<span class="badge bcam">'+d.imp.toLocaleString('es-AR')+'</span>':'—')+'</td>'+
      '<td><strong>'+d.uds.toLocaleString('es-AR')+'</strong></td>'+
      '<td>'+d.bultos.toLocaleString('es-AR')+'</td>'+
      '<td>'+(d.pend>0?'<span class="badge bbad">'+d.pend.toLocaleString('es-AR')+'</span>':'<span class="badge bok">OK</span>')+'</td>'+
      '</tr>';
  }).join('');

  html+=mkTable(
    'Ingresos por fecha de llegada ('+dias.length+' días)',
    '<tr><th>Fecha</th><th>Deliveries</th><th>Nacional</th><th>Importado</th><th>Total Uds</th><th>Bultos</th><th>Pendiente</th></tr>',
    rows
  );

  document.getElementById('main').innerHTML=html;
}

</script>
