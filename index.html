<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1422;--panel:#131d2e;--panel2:#1a2640;--border:#1f3050;--accent:#3b82f6;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;--tm:#38bdf8;--tt:#a78bfa;--tn:#34d399;--cam:#fb923c;--hk:#34d399;--ing:#a78bfa;--r:10px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:13px}
button{cursor:pointer;font-family:inherit}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-t{font-size:15px;font-weight:700}.hdr-s{font-size:10px;color:var(--muted2);margin-top:1px}
.hdr-r{display:flex;gap:8px;align-items:center}
.mod-tabs{display:flex;gap:2px;padding:0 20px;background:var(--panel2);border-bottom:1px solid var(--border)}
.mod-tab{padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:7px}
.mod-tab:hover{color:var(--text)}.mod-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mod-tab.mpick.active{color:var(--tm);border-bottom-color:var(--tm)}
.mod-tab.mcam.active{color:var(--cam);border-bottom-color:var(--cam)}
.mod-tab.mhk.active{color:var(--hk);border-bottom-color:var(--hk)}
.mod-tab.ming.active{color:var(--ing);border-bottom-color:var(--ing)}
.btn{padding:7px 15px;border-radius:7px;border:none;font-size:12px;font-weight:600;transition:.15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#2563eb}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#16a34a}
.btn-o{background:transparent;color:var(--muted2);border:1px solid var(--border)}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-r{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-r:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 11px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.layout{display:flex;height:calc(100vh - 101px)}
.sidebar{width:210px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-sec{padding:12px 12px 5px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;transition:.15s;font-size:12px;font-weight:500;color:var(--muted2);border-left:3px solid transparent}
.nav-item:hover{background:var(--panel2);color:var(--text)}.nav-item.active{background:var(--panel2);color:var(--accent);border-left-color:var(--accent)}
.nav-item .ni{font-size:14px}
.nav-div{height:1px;background:var(--border);margin:6px 12px}
.sync-s{padding:7px 14px;font-size:10px;display:flex;align-items:center;gap:6px}
.sync-d{width:7px;height:7px;border-radius:50%;background:var(--green)}.sync-d.sy{background:var(--yellow);animation:pulse 1s infinite}.sync-d.er{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.month-sel{margin:6px 12px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;font-size:12px;width:calc(100% - 24px);font-family:inherit}
.month-sel:focus{outline:none;border-color:var(--accent)}
.main{flex:1;overflow-y:auto;padding:18px 20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.sc.ctm{border-left:3px solid var(--tm)}.sc.ctt{border-left:3px solid var(--tt)}.sc.ctn{border-left:3px solid var(--tn)}

.sc.cok{border-left:3px solid var(--green)}.sc.cbad{border-left:3px solid var(--red)}.sc.cwrn{border-left:3px solid var(--yellow)}
.sc-l{font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-v{font-size:20px;font-weight:800;line-height:1}.sc-s{font-size:10px;color:var(--muted);margin-top:3px}
.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}
.tw{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.th2{padding:11px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.th2 h3{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--panel2);padding:8px 10px;text-align:center;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 10px;text-align:center;border-bottom:1px solid #1a2640}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(59,130,246,.04)}
td.tl{text-align:left;font-weight:600}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bok{background:rgba(34,197,94,.13);color:var(--green)}.bwarn{background:rgba(245,158,11,.13);color:var(--yellow)}.bbad{background:rgba(239,68,68,.13);color:var(--red)}
.btm{background:rgba(56,189,248,.13);color:var(--tm)}.btt{background:rgba(167,139,250,.13);color:var(--tt)}.btn2{background:rgba(52,211,153,.13);color:var(--tn)}

.sec-t{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 9px}

.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 20px;min-height:260px}
.drop-box{border:2px dashed var(--border);border-radius:16px;padding:36px 56px;text-align:center;cursor:pointer;transition:.2s;background:var(--panel2);width:100%;max-width:440px}
.drop-box:hover,.drop-box.drag{border-color:var(--accent)}
.drop-icon{font-size:36px;margin-bottom:10px}.drop-t{font-size:14px;font-weight:700;margin-bottom:5px}
.drop-s{color:var(--muted2);font-size:12px;line-height:1.6}
input[type=file]{display:none}
.paste-box{width:100%;min-height:120px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:monospace;font-size:11px;padding:12px;resize:vertical}
.paste-box:focus{outline:none;border-color:var(--accent)}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px}
.day-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.15s}
.day-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.dc-h{padding:9px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.dc-d{font-size:13px;font-weight:700}.dc-n{font-size:10px;color:var(--muted2)}
.dc-b{padding:9px 13px;display:flex;gap:16px}
.dc-stat{text-align:center}.dc-stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.dc-stat-v{font-size:14px;font-weight:700}
.dc-f{padding:5px 13px;background:var(--panel2);display:flex;justify-content:space-between;align-items:center}
.dc-f span{font-size:10px;color:var(--muted2)}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.zone-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.zone-card.ok{border-left:3px solid var(--green)}.zone-card.warn{border-left:3px solid var(--yellow)}.zone-card.bad{border-left:3px solid var(--red)}
.zone-name{font-size:12px;font-weight:700;margin-bottom:8px}
.zone-score{font-size:28px;font-weight:800;line-height:1}
.zone-sub{font-size:10px;color:var(--muted);margin-top:3px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:900px){.cg2{grid-template-columns:1fr}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:26px;max-width:480px;width:90%}
.modal h3{font-size:15px;font-weight:700;margin-bottom:7px}
.modal p{color:var(--muted2);font-size:12px;margin-bottom:18px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.3s;transform:translateY(10px)}
.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:var(--red)}
#ldr{display:none;position:fixed;inset:0;background:rgba(13,20,34,.88);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#ldr.on{display:flex}.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

<script>
// ══ SUPABASE ══════════════════════════════════════════════════════════════════
var SB_URL='https://mepgeidrcrsaqvcihslm.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lcGdlaWRyY3JzYXF2Y2loc2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzI3OTcsImV4cCI6MjA5NDMwODc5N30.1dji3baHAGyfcNfqPz9Nxu_BChRQqmt57jFJplCM8K4';
var SBH={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
var TABLES={pick:'picker_data',cam:'camara_data',hk:'hk_data'};

async function sbGet(mod,month){
  setSy(1);
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+TABLES[mod]+'?date_key=like.'+month+'*&select=date_key,data&order=date_key.asc',{headers:SBH});
    if(!r.ok)throw 0;
    var rows=await r.json(),out={};
    rows.forEach(function(r){out[r.date_key]=r.data;});
    setSy(0,'ok');return out;
  }catch(e){setSy(0,'er');throw e;}
}
async function sbAllMonths(mod){
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+TABLES[mod]+'?select=date_key&order=date_key.asc',{headers:SBH});
    if(!r.ok)throw 0;
    var rows=await r.json();
    return[...new Set(rows.map(function(r){return r.date_key.slice(0,7);}))];
  }catch(e){return[];}
}
async function sbUpsert(mod,dk,data){
  setSy(1);
  try{
    var patchR=await fetch(SB_URL+'/rest/v1/'+TABLES[mod]+'?date_key=eq.'+dk,{
      method:'PATCH',
      headers:Object.assign({},SBH,{'Prefer':'return=minimal'}),
      body:JSON.stringify({data:data,updated_at:new Date().toISOString()})
    });
    if(patchR.ok){
      var checkR=await fetch(SB_URL+'/rest/v1/'+TABLES[mod]+'?date_key=eq.'+dk+'&select=date_key',{headers:SBH});
      var rows=await checkR.json();
      if(rows&&rows.length>0){setSy(0,'ok');return true;}
    }
    var postR=await fetch(SB_URL+'/rest/v1/'+TABLES[mod],{
      method:'POST',
      headers:Object.assign({},SBH,{'Prefer':'return=minimal'}),
      body:JSON.stringify({date_key:dk,data:data,updated_at:new Date().toISOString()})
    });
    if(!postR.ok)throw new Error('HTTP '+postR.status);
    setSy(0,'ok');return true;
  }catch(e){setSy(0,'er');toast('Error guardando: '+e.message,'err');return false;}
}
function saveCamOut(val){
  window.CAM_OUT=val;
  try{localStorage.setItem('cam_out_'+CUR, val);}catch(e){}
  sbSaveOut(CUR,val);
  renderCamResumen();
}
async function sbGetOut(monthKey){
  try{
    var r=await fetch(SB_URL+'/rest/v1/cam_config?month_key=eq.'+monthKey+'&select=out_value',{headers:SBH});
    if(!r.ok)return 0;
    var rows=await r.json();
    return rows&&rows.length?rows[0].out_value:0;
  }catch(e){return 0;}
}
async function sbSaveOut(monthKey,val){
  try{
    var pr=await fetch(SB_URL+'/rest/v1/cam_config?month_key=eq.'+monthKey,{
      method:'PATCH',headers:Object.assign({},SBH,{'Prefer':'return=minimal'}),
      body:JSON.stringify({out_value:val,updated_at:new Date().toISOString()})});
    var check=await fetch(SB_URL+'/rest/v1/cam_config?month_key=eq.'+monthKey+'&select=month_key',{headers:SBH});
    var rows=await check.json();
    if(rows&&rows.length)return;
    await fetch(SB_URL+'/rest/v1/cam_config',{method:'POST',
      headers:Object.assign({},SBH,{'Prefer':'return=minimal'}),
      body:JSON.stringify({month_key:monthKey,out_value:val,updated_at:new Date().toISOString()})});
  }catch(e){}
}
async function sbDel(mod,dk){
  setSy(1);
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+TABLES[mod]+'?date_key=eq.'+dk,{method:'DELETE',headers:SBH});
    if(!r.ok)throw 0;
    setSy(0,'ok');return true;
  }catch(e){setSy(0,'er');toast('Error eliminando','err');return false;}
}
function setSy(on,st){
  var d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  if(on){d.className='sync-d sy';t.textContent='Sincronizando...';}
  else if(st==='ok'){d.className='sync-d';t.textContent='Sincronizado';}
  else{d.className='sync-d er';t.textContent='Error';}
}

// ══ STATE ════════════════════════════════════════════════════════════════════
var MOD='pick',PAGE='resumen',SEL=null,DEL=null,CUR=curMK(),CFG=lCfg();
var DB={pick:{},cam:{},hk:{}};
var APP_PASS='nike2025';
var HK_ZONES=['Pasillo 700','Pasillo 800','Mezzanine N1','Mezzanine N2','Mezzanine N3'];
var BKSL={TM:[{h:9,m:0,d:30},{h:12,m:0,d:60}],TT:[{h:18,m:0,d:30},{h:20,m:0,d:60}],TN:[{h:2,m:0,d:30},{h:4,m:0,d:60}]};

function lCfg(){try{return JSON.parse(localStorage.getItem('ops_cfg')||'{}');}catch(e){return{};}}
function sCfg(){localStorage.setItem('ops_cfg',JSON.stringify(CFG));}
function curMK(){var n=new Date();return n.getFullYear()+'-'+pad(n.getMonth()+1);}
function GAP(){return+(CFG.gap||15);}
function BRK(){return+(CFG.brk||90);}
function HKT(){return+(CFG.hk_target||0.95);}

// ══ MODULE SWITCH ════════════════════════════════════════════════════════════
function switchModule(mod){
  MOD=mod;PAGE='resumen';SEL=null;
  ['pick','cam','hk','ing'].forEach(function(m){document.getElementById('mtab-'+m).classList.toggle('active',m===mod);});
  var labels={pick:'+ Cargar día',cam:'+ Cargar producción',hk:'+ Cargar auditoría',ing:'+ Cargar Excel'};
  document.getElementById('btnLoad').textContent=labels[mod]||'+ Cargar';
  updNav();
  ldr(1,'Cargando...');
  if(MOD==='ing'){renderIngresosResumen();ldr(0);return;}
  updMS().then(function(){
    sbGet(MOD,CUR).then(function(data){
      DB[MOD]=data;
      if(MOD==='cam'){
        try{var lsOut=localStorage.getItem('cam_out_'+CUR);if(lsOut)window.CAM_OUT=+lsOut;}catch(e){}
        sbGetOut(CUR).then(function(o){if(o)window.CAM_OUT=o;render();ldr(0);});
      } else {
        render();ldr(0);
      }
    }).catch(function(){render();ldr(0);});
  });
}

// ══ PARSE HELPERS ════════════════════════════════════════════════════════════
function parseFecha(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  var s=String(v).trim();
  var m=s.match(/^(\d{1,2})\/(\d{2})\/(\d{2,4})\s+(\d{1,2}):(\d{2})/);
  if(m){var yr=+m[3];if(yr<100)yr+=2000;return new Date(yr,+m[2]-1,+m[1],+m[4],+m[5],0);}
  var d=new Date(s);return isNaN(d)?null:d;
}
function baseDate(dt){
  if(dt.getHours()<6){var p=new Date(dt);p.setDate(p.getDate()-1);return p.getFullYear()+'-'+pad(p.getMonth()+1)+'-'+pad(p.getDate());}
  return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());
}
function brkOverlap(sh,from,to,ymd){
  var yr=ymd[0],mo=ymd[1],dy=ymd[2],tot=0;
  (BKSL[sh]||[]).forEach(function(b){
    var bdy=dy;if(sh==='TN'&&b.h<12)bdy=dy+1;
    var bs=new Date(yr,mo,bdy,b.h,b.m,0),be=new Date(bs.getTime()+b.d*60000);
    var os=Math.max(from.getTime(),bs.getTime()),oe=Math.min(to.getTime(),be.getTime());
    if(oe>os)tot+=(oe-os)/60000;
  });
  return tot;
}

// ══ PICKERS ANALYSIS ═════════════════════════════════════════════════════════
function analyzePickDay(raw,dk){
  var p=dk.split('-'),yr=+p[0],mo=+p[1]-1,dy=+p[2];
  var wS=new Date(yr,mo,dy,6,0,0),wE=new Date(yr,mo,dy+1,6,0,0);
  var rows=[];
  for(var i=0;i<raw.length;i++){
    var r=raw[i],ks=Object.keys(r);
    var fk=ks.find(function(k){return /fecha|date/i.test(k);});
    var uk=ks.find(function(k){return /usuario|user/i.test(k);});
    var qk=ks.find(function(k){return /cantidad|qty|items/i.test(k);});
    if(!fk||!uk)continue;
    var dt=parseFecha(r[fk]);if(!dt)continue;
    var u=String(r[uk]||'').trim();if(!u)continue;
    var q=parseFloat(String(r[qk]||'0').replace(',','.'))||0;
    if(dt>=wS&&dt<wE)rows.push({dt:dt,user:u,qty:q});
  }
  function shOf(dt){var h=dt.getHours();if(h>=6&&h<14)return'TM';if(h>=14&&h<22)return'TT';return'TN';}
  var shifts={TM:[],TT:[],TN:[]};
  rows.forEach(function(r){shifts[shOf(r.dt)].push(r);});
  var STARTS={TM:new Date(yr,mo,dy,6,0),TT:new Date(yr,mo,dy,14,0),TN:new Date(yr,mo,dy,22,0)};
  var result={};
  Object.keys(shifts).forEach(function(sh){
    var sd=STARTS[sh],byU={};
    shifts[sh].forEach(function(r){if(!byU[r.user])byU[r.user]=[];byU[r.user].push(r);});
    var users=[];
    Object.keys(byU).forEach(function(user){
      var picks=byU[user].sort(function(a,b){return a.dt-b.dt;});
      var times=picks.map(function(p){return p.dt;}),n=times.length;
      var units=picks.reduce(function(s,p){return s+p.qty;},0);
      var preGap=Math.round(Math.max(0,(times[0]-sd)/60000-brkOverlap(sh,sd,times[0],[yr,mo,dy])));
      var inter=0;
      for(var i=0;i<n-1;i++){
        var gRaw=(times[i+1]-times[i])/60000;
        if(gRaw>=GAP()){var net=Math.max(0,gRaw-brkOverlap(sh,times[i],times[i+1],[yr,mo,dy]));if(net>=GAP())inter+=net;}
      }
      inter=Math.round(inter);
      var dead=preGap+inter,exc=Math.max(0,dead-BRK());
      var elap=Math.max(0,Math.round((times[n-1]-sd)/60000));
      var prod=Math.max(0,elap-dead),iph=prod>0?Math.round(n/(prod/60)*10)/10:0;
      users.push({user:user,items:n,units:Math.round(units),first:fmtT(times[0]),last:fmtT(times[n-1]),preGap:preGap,inter:inter,dead:dead,allowed:BRK(),exc:exc,prod:prod,iph:iph});
    });
    users.sort(function(a,b){return b.exc-a.exc;});
    result[sh]=users;
  });
  return result;
}

// ══ CAMARA ANALYSIS ══════════════════════════════════════════════════════════
function parseCamaraText(text){
  var rows=[];
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\xa0/g,' ');
  var lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line||line.length<5)continue;
    if(/^(fecha|tramite|cliente)/i.test(line))continue;
    if(/^(clientes$|tiendas|total)/i.test(line))continue;
    var cols=line.split('\t').map(function(s){return s.trim();});
    if(cols.length<4)continue;
    if(!/^\d{1,2}[\/\-]\d{1,2}/.test(cols[0]))continue;
    var fecha=cols[0];
    var tramite=cols[1]||'';
    var cantIdx=-1,cant=0;
    for(var j=2;j<cols.length;j++){
      if(/^\d{1,4}$/.test(cols[j])&&+cols[j]>=1&&+cols[j]<=9999){cantIdx=j;cant=+cols[j];break;}
    }
    if(cantIdx<0)continue;
    var cliente=cols.slice(2,cantIdx).join(' ').trim()||'DESCONOCIDO';
    var rest=cols.slice(cantIdx+1).join(' ').toUpperCase();
    var cat;
    if(rest.indexOf('TIENDAS')>=0||rest.indexOf('TIENDA PROPIA')>=0){cat='TIENDAS PROPIAS';}
    else if(rest.indexOf('CLIENTE')>=0){cat='CLIENTES';}
    else if(/^\d{3,6}\-\d/.test(tramite)){cat='CLIENTES';}
    else{cat='TIENDAS PROPIAS';}
    rows.push({fecha:fecha,tramite:tramite,cliente:cliente,cantidad:cant,estado:'CERRADO',tipo:'',categoria:cat});
  }
  return rows;
}
function buildCamaraResult(rows,dk){
  var byCat={CLIENTES:{cant:0,n:0},'TIENDAS PROPIAS':{cant:0,n:0}};
  var byCli={};
  rows.forEach(function(r){
    var cat=r.categoria||'OTROS';
    if(!byCat[cat])byCat[cat]={cant:0,n:0};
    byCat[cat].cant+=r.cantidad;byCat[cat].n++;
    var cli=r.cliente||'?';
    if(!byCli[cli])byCli[cli]={cant:0,n:0};
    byCli[cli].cant+=r.cantidad;byCli[cli].n++;
  });
  var topCli=Object.entries(byCli).sort(function(a,b){return b[1].cant-a[1].cant;}).slice(0,15).map(function(e){return{cliente:e[0],cant:e[1].cant,n:e[1].n};});
  return{rows:rows,byCat:byCat,topCli:topCli,totUnits:rows.reduce(function(a,r){return a+r.cantidad;},0),totTram:rows.length,date:dk};
}

// ══ HK ANALYSIS ══════════════════════════════════════════════════════════════
function buildHKResult(entries){
  var byZone={};HK_ZONES.forEach(function(z){byZone[z]=[];});
  entries.forEach(function(e){if(byZone[e.zona])byZone[e.zona].push(e);});
  var zoneStats={};
  Object.keys(byZone).forEach(function(z){
    var arr=byZone[z];
    if(!arr.length){zoneStats[z]=null;return;}
    function avg(col){return Math.round(arr.reduce(function(a,r){return a+(r[col]||0);},0)/arr.length*10000)/10000;}
    zoneStats[z]={n:arr.length,s5:avg('s5'),calidad:avg('calidad'),hys:avg('hys'),mant:avg('mant'),nota:avg('nota')};
  });
  var promGlobal=entries.length?Math.round(entries.reduce(function(a,r){return a+(r.nota||0);},0)/entries.length*10000)/10000:0;
  return{zoneStats:zoneStats,promGlobal:promGlobal,entries:entries,n:entries.length};
}

async function processHKPaste(){
  var text=document.getElementById('hkPaste').value;
  var dk=document.getElementById('hkDate').value;
  if(!text.trim()){toast('Pegá los datos primero','err');return;}
  if(!dk){toast('Elegí la fecha','err');return;}
  ldr(1,'Procesando...');
  try{
    var entries=parseHKExcel(text);
    if(!entries.length){ldr(0);toast('No se encontraron datos válidos.','err');return;}
    if(DB.hk[dk]){
      var existing=(DB.hk[dk].entries||[]).filter(function(e){return !entries.find(function(n){return n.sector===e.sector;});});
      entries=existing.concat(entries);
    }
    var result=buildHKResult(entries);
    ldr(1,'Guardando...');
    var ok=await sbUpsert('hk',dk,result);if(!ok){ldr(0);return;}
    DB.hk[dk]=result;
    var nm=dk.slice(0,7);if(nm!==CUR){CUR=nm;await updMS();}
    PAGE='resumen';updNav();render();ldr(0);
    toast('✓ '+entries.length+' sectores guardados para '+dk);
  }catch(ex){toast('Error: '+ex.message,'err');ldr(0);}

function parseHKExcel(text){
  var entries=[];
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\xa0/g,' ');
  var lines=text.split('\n');
  function pct(s){
    if(!s&&s!==0)return 0;
    s=String(s).trim().replace(/%/g,'').replace(/,/g,'.');
    var n=parseFloat(s);if(isNaN(n))return null;
    return n>1?n/100:n;
  }
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    if(/^fecha/i.test(line)||/^sector/i.test(line))continue;
    var cols=line.split('\t');if(cols.length<9)continue;
    if(!/\d{1,2}[\/\-]\d{1,2}/.test(cols[0]))continue;
    var sector=cols[2].trim();if(!sector)continue;
    var zona=cols[3].trim();
    if(/pasillo\s*7/i.test(zona)) zona='Pasillo 700';
    else if(/pasillo\s*8/i.test(zona)) zona='Pasillo 800';
    else if(/n1/i.test(zona)) zona='Mezzanine N1';
    else if(/n2/i.test(zona)) zona='Mezzanine N2';
    else if(/n3/i.test(zona)) zona='Mezzanine N3';
    else continue;
    var s5=pct(cols[4]),cal=pct(cols[5]),hys=pct(cols[6]),mant=pct(cols[7]),nota=pct(cols[8]);
    if(nota===null)continue;
    entries.push({sector:sector,zona:zona,s5:s5||0,calidad:cal||0,hys:hys||0,mant:mant||0,nota:nota});
  }
  return entries;
}

// ══ PICKERS RENDERS ══════════════════════════════════════════════════════════
function pickRanking(){
  var map={};
  Object.keys(DB.pick).forEach(function(dk){
    ['TM','TT','TN'].forEach(function(sh){
      (DB.pick[dk][sh]||[]).forEach(function(u){
        if(!map[u.user])map[u.user]={user:u.user,days:0,items:0,units:0,iph_s:0,dead:0,exc:0,prod:0};
        var r=map[u.user];r.days++;r.items+=u.items;r.units+=u.units;r.iph_s+=u.iph;r.dead+=u.dead;r.exc+=u.exc;r.prod+=u.prod;
      });
    });
  });
  return Object.values(map).map(function(r){
    r.avg_iph=r.days>0?Math.round(r.iph_s/r.days*10)/10:0;
    r.pct=r.prod+r.dead>0?Math.round(r.dead/(r.prod+r.dead)*100):0;
    return r;
  }).sort(function(a,b){return b.exc-a.exc;});
}
function pickShift(){
  var res={TM:{items:0,exc:0,dead:0,prod:0,pk:new Set(),iph_s:0,n:0},TT:{items:0,exc:0,dead:0,prod:0,pk:new Set(),iph_s:0,n:0},TN:{items:0,exc:0,dead:0,prod:0,pk:new Set(),iph_s:0,n:0}};
  Object.keys(DB.pick).forEach(function(dk){
    ['TM','TT','TN'].forEach(function(sh){
      (DB.pick[dk][sh]||[]).forEach(function(u){res[sh].items+=u.items;res[sh].exc+=u.exc;res[sh].dead+=u.dead;res[sh].prod+=u.prod;res[sh].pk.add(u.user);res[sh].iph_s+=u.iph;res[sh].n++;});
    });
  });
  Object.keys(res).forEach(function(sh){var r=res[sh];r.avg_iph=r.n>0?Math.round(r.iph_s/r.n*10)/10:0;r.pct=r.prod+r.dead>0?Math.round(r.dead/(r.prod+r.dead)*100):0;r.pickers=r.pk.size;});
  return res;
}

function weekNum(dk){
  var d=new Date(dk+'T12:00:00');
  var first=new Date(d.getFullYear(),d.getMonth(),1);
  return Math.ceil((d.getDate()+first.getDay())/7);
}
function renderHKResumen(){
  var days=Object.keys(DB.hk).sort();
  if(!days.length){document.getElementById('main').innerHTML='<div class="no-data">Sin datos cargados</div>';return;}
  var target=HKT();
  var ZONES=['Pasillo 700','Pasillo 800','Mezzanine N1','Mezzanine N2','Mezzanine N3'];
  var ZSHORT=['P.700','P.800','N1','N2','N3'];
  var zoneData={};
  ZONES.forEach(function(z){zoneData[z]={all:[],byWeek:{1:[],2:[],3:[],4:[],5:[]}};});
  var allE=[],alerts=[];
  days.forEach(function(dk){
    var wk=weekNum(dk);
    (DB.hk[dk].entries||[]).forEach(function(e){
      var ze=zoneData[e.zona];
      if(ze){ze.all.push(e);if(ze.byWeek[wk])ze.byWeek[wk].push(e);}
      allE.push(Object.assign({},e,{fecha:dk,semana:wk}));
      if(e.nota<target)alerts.push(Object.assign({},e,{fecha:dk,semana:wk}));
    });
  });
  function avg(arr,col){if(!arr||!arr.length)return null;return arr.reduce(function(a,r){return a+(r[col]||0);},0)/arr.length;}
  function rnd(v){return v!==null&&v!==undefined?Math.round(v*1000)/10:null;}
  var promG=avg(allE,'nota');
  var bestZ=null,worstZ=null,bestA=0,worstA=2;
  ZONES.forEach(function(z){var a=avg(zoneData[z].all,'nota');if(a===null)return;if(a>bestA){bestA=a;bestZ=z;}if(a<worstA){worstA=a;worstZ=z;}});
  var html='';
  html+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px">';
  function ekpi(t,v,s,c){return '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center">'+
    '<div style="font-size:9px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">'+t+'</div>'+
    '<div style="font-size:18px;font-weight:800;color:'+(c||'var(--text)')+'">'+v+'</div>'+
    (s?'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+s+'</div>':'')+'</div>';}
  var pg=promG?rnd(promG):0;
  html+=ekpi('Nota Promedio',pg+'%','mensual global',pg>=target*100?'var(--green)':pg>=target*100*0.9?'var(--yellow)':'var(--red)');
  html+=ekpi('🏆 Mejor Zona',bestZ?bestZ.replace('Mezzanine ','Mez. '):'—',bestZ?rnd(bestA)+'%':'');
  html+=ekpi('⚠️ A Mejorar',worstZ?worstZ.replace('Mezzanine ','Mez. '):'—',worstZ?rnd(worstA)+'%':'');
  html+=ekpi('📋 Auditorías',allE.length,'sectores auditados');
  var vst=promG?rnd(promG-target):(-(target*100));
  html+=ekpi('vs Target '+(target*100)+'%',(vst>=0?'+':'')+vst+'%','',vst>=0?'var(--green)':'var(--red)');
  html+='</div>';
  html+='<div class="cg2" style="margin-bottom:14px">';
  html+='<div class="tw"><div class="th2"><h3>🚦 Semáforo por Zona</h3></div>';
  html+='<table><thead><tr><th>Zona</th><th>Nota</th><th>Target</th><th>Dif.</th><th></th></tr></thead><tbody>';
  ZONES.forEach(function(z){
    var a=avg(zoneData[z].all,'nota');
    if(a===null){html+='<tr><td class="tl" style="font-size:11px">'+z+'</td><td colspan="4" style="color:var(--muted)">Sin datos</td></tr>';return;}
    var notaP=rnd(a),dif=rnd(a-target);
    html+='<tr><td class="tl" style="font-size:11px">'+z+'</td>'+
      '<td><strong style="color:'+(a>=target?'var(--green)':a>=target*0.9?'var(--yellow)':'var(--red)')+'">'+notaP+'%</strong></td>'+
      '<td>'+(target*100)+'%</td>'+
      '<td style="color:'+(dif>=0?'var(--green)':'var(--red)')+'">'+(dif>=0?'+':'')+dif+'%</td>'+
      '<td style="font-size:16px">'+(a>=target?'🟢':a>=target*0.9?'🟡':'🔴')+'</td></tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="tw"><div class="th2"><h3>Resumen Mensual</h3></div>';
  html+='<table><thead><tr><th>Zona</th><th>N</th><th>5S</th><th>Cal.</th><th>HYS</th><th>Mant.</th><th>Nota</th><th>Estado</th></tr></thead><tbody>';
  ZONES.forEach(function(z){
    var arr=zoneData[z].all;
    if(!arr.length){html+='<tr><td class="tl" style="font-size:11px">'+z+'</td><td colspan="7" style="color:var(--muted)">Sin datos</td></tr>';return;}
    var nota=avg(arr,'nota'),notaP=rnd(nota);
    html+='<tr><td class="tl" style="font-size:11px">'+z+'</td><td>'+arr.length+'</td>'+
      '<td>'+rnd(avg(arr,'s5'))+'%</td><td>'+rnd(avg(arr,'calidad'))+'%</td>'+
      '<td>'+rnd(avg(arr,'hys'))+'%</td><td>'+rnd(avg(arr,'mant'))+'%</td>'+
      '<td><strong style="color:'+(nota>=target?'var(--green)':nota>=target*0.9?'var(--yellow)':'var(--red)')+'">'+notaP+'%</strong></td>'+
      '<td style="font-size:11px">'+(nota>=target?'✔ OK':'⚠ BAJO')+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  html+='<div class="tw" style="margin-bottom:14px"><div class="th2"><h3>📈 Tendencia Semanal</h3><span style="font-size:10px;color:var(--muted)">Nota General promedio</span></div>';
  html+='<table><thead><tr><th>Semana</th>'+ZSHORT.map(function(z){return '<th>'+z+'</th>';}).join('')+'<th>Prom.</th><th>Target</th></tr></thead><tbody>';
  for(var wk=1;wk<=5;wk++){
    var wkE=allE.filter(function(e){return e.semana===wk;});
    if(!wkE.length)continue;
    var wa=avg(wkE,'nota'),waP=rnd(wa);
    html+='<tr><td><strong>Sem '+wk+'</strong></td>';
    ZONES.forEach(function(z){
      var ze=zoneData[z].byWeek[wk];
      if(!ze||!ze.length){html+='<td style="color:var(--muted)">—</td>';return;}
      var za=rnd(avg(ze,'nota'));
      html+='<td style="color:'+(za>=target*100?'var(--green)':za>=target*100*0.9?'var(--yellow)':'var(--red)')+'"><strong>'+za+'%</strong></td>';
    });
    html+='<td><strong style="color:'+(wa>=target?'var(--green)':'var(--red)')+'">'+waP+'%</strong></td>';
    html+='<td style="color:var(--muted)">'+(target*100)+'%</td></tr>';
  }
  html+='</tbody></table></div>';
  if(alerts.length){
    html+='<div class="tw" style="margin-bottom:14px"><div class="th2"><h3>🔔 Alertas — Sectores bajo el '+(target*100)+'%</h3><span class="badge bbad">'+alerts.length+' incumplimientos</span></div>';
    html+='<table><thead><tr><th>Fecha</th><th>Sem.</th><th>Sector</th><th>Zona</th><th>5S</th><th>Calidad</th><th>HYS</th><th>Mant.</th><th>Nota</th></tr></thead><tbody>';
    alerts.forEach(function(e){
      var fp=e.fecha.split('-'),dlbl=(+fp[2])+'/'+fp[1];
      html+='<tr><td>'+dlbl+'</td><td>'+e.semana+'</td><td>'+e.sector+'</td><td class="tl" style="font-size:11px">'+e.zona+'</td>'+
        '<td>'+rnd(e.s5)+'%</td><td>'+rnd(e.calidad)+'%</td><td>'+rnd(e.hys)+'%</td><td>'+rnd(e.mant)+'%</td>'+
        '<td><strong class="bad">'+rnd(e.nota)+'%</strong></td></tr>';
    });
    html+='</tbody></table></div>';
  }
  var dayRows=days.map(function(dk){
    var d=DB.hk[dk],fp=dk.split('-'),lbl=(+fp[2])+'/'+fp[1];
    var pr=rnd(d.promGlobal)||0;
    var cls=pr>=target*100?'var(--green)':pr>=target*100*0.9?'var(--yellow)':'var(--red)';
    var sectors=(d.entries||[]).map(function(e){return e.sector;}).join(', ');
    return '<tr><td class="tl"><strong>'+lbl+'</strong></td>'+
      '<td>'+(d.n||0)+' sectores</td>'+
      '<td style="font-size:10px;color:var(--muted2);text-align:left">'+sectors+'</td>'+
      '<td><strong style="color:'+cls+'">'+pr+'%</strong></td>'+
      '<td><button class="btn btn-o btn-xs" onclick="viewDay(\''+dk+'\')">Ver</button> '+
      '<button class="btn btn-r btn-xs" onclick="askDel(\''+dk+'\')">✕</button></td></tr>';
  }).join('');
  html+=mkTable('Auditorías cargadas','<tr><th>Fecha</th><th>N</th><th>Sectores auditados</th><th>Prom. Global</th><th>Acciones</th></tr>',dayRows);
  document.getElementById('main').innerHTML=html;
}

      });
      var rRows=[['#','Usuario','Días','Items','Prom i/h','Excedente acum.','T.Muerto','% T.Muerto']];

// ── Supabase helpers ─────────────────────────────────────────────────────────
async function sbGetIngresos(filters){
  setSy(1);
  try{
    var params='select=*&order=fecha_llegada.desc.nullslast&limit=5000';
    if(filters&&filters.mes) params+='&mes=eq.'+filters.mes;
    if(filters&&filters.origen) params+='&origen=eq.'+encodeURIComponent(filters.origen);
    var controller=new AbortController();
    var timeout=setTimeout(function(){controller.abort();},8000);
    var r=await fetch(SB_URL+'/rest/v1/ingresos_data?'+params,{headers:SBH,signal:controller.signal});
    clearTimeout(timeout);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    setSy(0,'ok');return data||[];
  }catch(e){setSy(0,'er');return[];}
}

async function sbUpsertIngresos(rows){
  setSy(1);
  try{
    for(var i=0;i<rows.length;i+=500){
      var batch=rows.slice(i,i+500);
      var r=await fetch(SB_URL+'/rest/v1/ingresos_data',{
        method:'POST',
        headers:Object.assign({},SBH,{'Prefer':'resolution=merge-duplicates'}),
        body:JSON.stringify(batch)
      });
      if(!r.ok){var err=await r.text();throw new Error('HTTP '+r.status+': '+err);}
    }
    setSy(0,'ok');return true;
  }catch(e){setSy(0,'er');toast('Error guardando ingresos: '+e.message,'err');return false;}
}

// ── Parse Excel — BU column ───────────────────────────────────────────────────
function parseIngresosExcel(arrayBuffer){
  var wb=XLSX.read(arrayBuffer,{type:'array',cellDates:true});
  var rows=[];
  var sheets=['NACIONAL','IMPORTADO'];

  sheets.forEach(function(sheetName){
    if(!wb.SheetNames.includes(sheetName))return;
    var ws=wb.Sheets[sheetName];
    var data=XLSX.utils.sheet_to_json(ws,{defval:null,raw:false});

    data.forEach(function(row){
      var fechaStr=row['Fecha de llegada']||row['FECHA DE LLEGADA'];
      var origen=row['ORIGEN']||sheetName;
      var proveedor=row['Proveedor']||row['PROVEEDOR'];
      var despacho=row['Nº Despacho']||row['Nº DESPACHO']||'NO APLICA';
      var embarque=row['Embarque']||row['EMBARQUE']||'NO APLICA';
      var delivery=row['N° Delivery']||row['N° DELIVERY'];
      // BU column (formerly GPC)
      var bu=row['BU']||row['GPC'];
      var bultos=parseFloat(row['bultos']||row['Bultos']||0)||0;
      var unidades=parseFloat(row['Unidades']||row['UNIDADES']||0)||0;
      var fisico=parseFloat(row['Fisico']||row['FISICO']||0)||0;
      var cargadoInfor=row['Cargado\nA INFOR']||row['Cargado A INFOR']||'';
      var estado=row['Recibido / Pendiente']||row['RECIBIDO / PENDIENTE']||'';
      var obs=row['Observación']||row['Observacion']||'';
      var material=row['Material']||row['MATERIAL']||'';
      var fechaGrStr=row['Fecha de GR']||row['FECHA DE GR'];
      var mes=parseInt(row['MES']||row['Mes']||0)||null;

      if(!delivery||!bu)return;
      if(!proveedor||proveedor==='Proveedor')return;

      var fechaLlegada=null,fechaGr=null;
      if(fechaStr){var d=new Date(fechaStr);if(!isNaN(d))fechaLlegada=d.toISOString().slice(0,10);}
      if(fechaGrStr){var d2=new Date(fechaGrStr);if(!isNaN(d2))fechaGr=d2.toISOString().slice(0,10);}
      if(!mes&&fechaLlegada){mes=parseInt(fechaLlegada.split('-')[1]);}

      var deliveryKey=String(delivery)+'_'+String(bu);

      rows.push({
        delivery_key:deliveryKey,
        fecha_llegada:fechaLlegada,
        origen:String(origen).trim(),
        proveedor:String(proveedor).trim(),
        nro_despacho:String(despacho).trim(),
        embarque:String(embarque).trim(),
        nro_delivery:parseInt(delivery)||null,
        bu:String(bu).trim(),
        bultos:bultos,
        unidades:unidades,
        fisico:fisico,
        cargado_infor:String(cargadoInfor).trim(),
        estado:String(estado).trim(),
        observacion:String(obs).trim(),
        fecha_gr:fechaGr,
        mes:mes,
        updated_at:new Date().toISOString()
      });
    });
  });
  return rows;
}

function readIngresosFile(f){
  if(!f)return;
  ldr(1,'Leyendo archivo...');
  var r=new FileReader();
  r.onload=function(e){
    try{
      var rows=parseIngresosExcel(e.target.result);
      if(!rows.length){toast('No se encontraron datos válidos','err');ldr(0);return;}
      ldr(1,'Guardando '+rows.length+' registros...');
      sbUpsertIngresos(rows).then(function(ok){
        if(ok){
          toast('✓ '+rows.length+' registros guardados');

          renderIngresosResumen();
        }
        ldr(0);

  };
  r.readAsArrayBuffer(f);
}

function buildIngresosView(){
  var all=window.ING_DATA||[];
  var F=window.ING_FILTERS;

  var filtered=all.filter(function(r){
    if(F.mes&&F.mes!=='TODOS'&&r.mes!=F.mes)return false;
    if(F.origen&&F.origen!=='TODOS'&&r.origen!==F.origen)return false;
    if(F.estado&&F.estado!=='TODOS'&&r.estado!==F.estado)return false;
    if(F.bu&&F.bu!=='TODOS'&&r.bu!==F.bu)return false;
    return true;
  });

  var totBultos=0,totUnidades=0,totDeliveries=new Set(),totPend=0,totRec=0;
  var byOrigen={NACIONAL:{bultos:0,unidades:0,deliveries:new Set(),pend:0},IMPORTADO:{bultos:0,unidades:0,deliveries:new Set(),pend:0}};
  var byBU={FTW:{bultos:0,unidades:0},APP:{bultos:0,unidades:0},EQP:{bultos:0,unidades:0}};
  var byProv={};var byEmbarque={};var byMes={};

  filtered.forEach(function(r){
    var b=r.bultos||0,u=r.unidades||0;
    totBultos+=b;totUnidades+=u;totDeliveries.add(r.nro_delivery);
    if(r.estado==='P')totPend+=u;
    if(r.estado==='R')totRec+=u;
    var o=r.origen;
    if(byOrigen[o]){byOrigen[o].bultos+=b;byOrigen[o].unidades+=u;byOrigen[o].deliveries.add(r.nro_delivery);if(r.estado==='P')byOrigen[o].pend+=u;}
    var buKey=r.bu||'OTRO';
    if(byBU[buKey]){byBU[buKey].bultos+=b;byBU[buKey].unidades+=u;}
    var prov=r.proveedor||'?';
    if(!byProv[prov])byProv[prov]={bultos:0,unidades:0};
    byProv[prov].bultos+=b;byProv[prov].unidades+=u;
    var emb=r.embarque||'NO APLICA';
    if(!byEmbarque[emb])byEmbarque[emb]={bultos:0,unidades:0,deliveries:new Set(),origen:r.origen,pend:0};
    byEmbarque[emb].bultos+=b;byEmbarque[emb].unidades+=u;byEmbarque[emb].deliveries.add(r.nro_delivery);
    if(r.estado==='P')byEmbarque[emb].pend+=u;
    var m=r.mes||0;
    if(!byMes[m])byMes[m]={bultos:0,unidades:0,pend:0};
    byMes[m].bultos+=b;byMes[m].unidades+=u;if(r.estado==='P')byMes[m].pend+=u;
  });

  var mesesDisp=[...new Set(all.map(function(r){return r.mes;}))].filter(Boolean).sort();
  var mesNombres=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // ── FILTERS BAR ──
  var html='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">';
  html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted2);font-weight:700">MES</span>';
  html+='<select onchange="window.ING_FILTERS.mes=this.value===\'TODOS\'?\'TODOS\':+this.value;buildIngresosView()" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit">';
  html+='<option value="TODOS">Todos los meses</option>';
  mesesDisp.forEach(function(m){html+='<option value="'+m+'"'+(F.mes==m?' selected':'')+'>'+mesNombres[m]+'</option>';});
  html+='</select></div>';

  html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted2);font-weight:700">ORIGEN</span>';
  html+='<select onchange="window.ING_FILTERS.origen=this.value;buildIngresosView()" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit">';
  ['TODOS','NACIONAL','IMPORTADO'].forEach(function(o){html+='<option value="'+o+'"'+(F.origen===o?' selected':'')+'>'+o+'</option>';});
  html+='</select></div>';

  html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted2);font-weight:700">BU</span>';
  html+='<select onchange="window.ING_FILTERS.bu=this.value;buildIngresosView()" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit">';

  html+='</select></div>';

  html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted2);font-weight:700">ESTADO</span>';
  html+='<select onchange="window.ING_FILTERS.estado=this.value;buildIngresosView()" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit">';
  ['TODOS','R','P'].forEach(function(e){html+='<option value="'+e+'"'+(F.estado===e?' selected':'')+'>'+{'TODOS':'Todos','R':'Recibidos','P':'Pendientes'}[e]+'</option>';});
  html+='</select></div></div>';

    {l:'% Pendiente',v:(totUnidades>0?Math.round(totPend/totUnidades*100):0)+'%',cls:totPend>0?'cwrn':'cok'}

  // ── NACIONAL vs IMPORTADO ──
  html+='<div class="cg2" style="margin-bottom:14px">';

    var isNacNoAplica=(dat.origen==='NACIONAL'&&emb==='NO APLICA');
    var embCell=isNacNoAplica?
      '<input type="text" placeholder="Ingresá N° embarque" onchange="updateEmbarqueNac(\''+emb+'\',this.value,\''+dat.origen+'\')" style="background:var(--panel2);border:1px solid var(--yellow);color:var(--text);border-radius:5px;padding:3px 7px;font-size:11px;width:140px">':
      '<span>'+emb+'</span>';
    return '<tr>'+
      '<td class="tl">'+embCell+'</td>'+
      '<td><span class="badge '+(dat.origen==='NACIONAL'?'btm':'bcam')+'">'+dat.origen+'</span></td>'+
      '<td>'+dat.deliveries.size+'</td>'+
      '<td>'+dat.bultos.toLocaleString('es-AR')+'</td>'+
      '<td><strong>'+dat.unidades.toLocaleString('es-AR')+'</strong></td>'+
      '<td>'+(dat.pend>0?'<span class="badge bbad">'+dat.pend.toLocaleString('es-AR')+' pend.</span>':'<span class="badge bok">OK</span>')+'</td>'+
      '</tr>';
  }).join('');
  html+=mkTable('📦 Por Embarque',
    '<tr><th>Embarque</th><th>Origen</th><th>Deliveries</th><th>Bultos</th><th>Unidades</th><th>Pendiente</th></tr>',
    embRows);

  // ── DETAIL BY DATE ──
  var byFecha={};
  filtered.forEach(function(r){
    var f=r.fecha_llegada||'Sin fecha';
    if(!byFecha[f])byFecha[f]={fecha:f,rows:[],bultos:0,unidades:0,pend:0};
    byFecha[f].rows.push(r);byFecha[f].bultos+=r.bultos||0;byFecha[f].unidades+=r.unidades||0;
    if(r.estado==='P')byFecha[f].pend+=r.unidades||0;
  });
  var detRows=Object.values(byFecha).sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).slice(0,20).map(function(d){
    var fp=d.fecha!='Sin fecha'?d.fecha.slice(8)+'/'+d.fecha.slice(5,7):d.fecha;
    var nac=d.rows.filter(function(r){return r.origen==='NACIONAL';}).reduce(function(a,r){return a+r.unidades;},0);
    var imp=d.rows.filter(function(r){return r.origen==='IMPORTADO';}).reduce(function(a,r){return a+r.unidades;},0);
    var dels=new Set(d.rows.map(function(r){return r.nro_delivery;})).size;
    return '<tr>'+
      '<td class="tl"><strong>'+fp+'</strong></td><td>'+dels+'</td>'+
      '<td>'+(nac>0?'<span class="badge btm">'+nac.toLocaleString('es-AR')+'</span>':'—')+'</td>'+
      '<td>'+(imp>0?'<span class="badge bcam">'+imp.toLocaleString('es-AR')+'</span>':'—')+'</td>'+
      '<td><strong>'+d.unidades.toLocaleString('es-AR')+'</strong></td>'+
      '<td>'+(d.pend>0?'<span class="badge bbad">'+d.pend.toLocaleString('es-AR')+'</span>':'<span class="badge bok">OK</span>')+'</td></tr>';
  }).join('');
  html+=mkTable('📅 Últimas fechas de llegada',
    '<tr><th>Fecha</th><th>Deliveries</th><th>Nacional (uds)</th><th>Importado (uds)</th><th>Total Uds</th><th>Pendiente</th></tr>',
    detRows);

  document.getElementById('main').innerHTML=html;
}

async function updateEmbarqueNac(oldEmb,newEmb,origen){
  if(!newEmb.trim())return;
  ldr(1,'Actualizando embarques...');
  try{
    var r=await fetch(SB_URL+'/rest/v1/ingresos_data?origen=eq.NACIONAL&embarque=eq.NO APLICA',{
      method:'PATCH',
      headers:Object.assign({},SBH,{'Prefer':'return=minimal'}),
      body:JSON.stringify({embarque:newEmb.trim(),updated_at:new Date().toISOString()})
    });
    if(r.ok){toast('✓ Embarque actualizado');window.ING_DATA=null;await renderIngresosResumen();}
    else{toast('Error actualizando','err');}
  }catch(e){toast('Error: '+e.message,'err');}
  ldr(0);
}

</script>
</body>
</html>
